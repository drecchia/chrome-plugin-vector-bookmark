# Secret for optional LLM / embedding API credentials.
# Create it with kubectl before applying the deployment:
#
#   kubectl create secret generic vbm-llm-secret \
#     --namespace vbm \
#     --from-literal=VBM_EMBED_API_KEY=<your-key>
#
# Or apply this file after filling in the base64-encoded values:
#   echo -n '<your-key>' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: vbm-llm-secret
  namespace: vbm
type: Opaque
data:
  # base64-encoded values — replace the placeholders.
  VBM_EMBED_API_KEY: ""   # echo -n 'sk-...' | base64
